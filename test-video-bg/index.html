<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vídeo BG em Loop</title>
  <style>
    /* Vídeo ocupa a tela toda, atrás do conteúdo */
    .bg-video {
      position: fixed;
      inset: 0;
      /* top/right/bottom/left: 0 */
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* “cover” como background-size */
      z-index: -1;
      /* atrás do conteúdo */
      filter: none;
      /* ajuste se quiser um blur ou escurecer */
    }

    /* Conteúdo por cima do vídeo */
    .content {
      position: relative;
      min-height: 100svh;
      /* toda a altura visível, inclusive mobile */
      display: grid;
      place-items: center;
      text-align: center;
      color: white;
    }

    /* Camada de leitura opcional (escurecer um pouco) */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      z-index: -1;
    }

    /* Respeitar usuários com redução de movimento */
    @media (prefers-reduced-motion: reduce) {
      .bg-video {
        display: none;
      }

      /* some e mostra o poster */
      body {
        background: #000;
      }

      /* combine com a sua identidade visual */
    }
  </style>
</head>

<body>
  <!-- Vídeo de fundo -->
  <video id="bgVideo" class="bg-video" autoplay muted loop playsinline <!-- iOS -->
    preload="auto"
    poster="/media/bg-poster.jpg"
    disablepictureinpicture
    controlslist="nodownload noplaybackrate nofullscreen noremoteplayback"
    aria-hidden="true"
    >
    <!-- MP4/H.264 é o mais compatível (iOS) -->
    <source src="/test-video-bg/media/bg-video.mp4" type="video/mp4" />
    <!-- (Opcional) WebM para navegadores que suportam, mas não espere iOS -->
    <!-- <source src="/media/bg-video.webm" type="video/webm" /> -->
  </video>

  <!-- Camada de leitura opcional -->
  <div class="scrim" aria-hidden="true"></div>

  <!-- Seu conteúdo -->
  <main class="content">
    <div>
      <h1>Seu Site</h1>
      <p>Texto por cima do vídeo de fundo.</p>
      <a href="#cta"
        style="display:inline-block;padding:.8rem 1.2rem;background:#fff;color:#111;border-radius:.6rem;text-decoration:none;">Call
        to Action</a>
    </div>
  </main>

  <script>
    // Tentativa programática de tocar (alguns browsers exigem gesto do usuário se algo bloquear)
    const v = document.getElementById('bgVideo');
    // Evita travas quando o usuário ativou “Economia de dados” ou “Modo de baixo consumo” no iOS
    const tryPlay = () => v?.play?.().catch(() => {
      // Se falhar, mantém o poster (não quebra layout) ou exiba um fallback discreto
      // Exemplo: adicionar uma classe para mostrar um bg estático
      document.body.classList.add('video-fallback');
    });
    // Tenta tocar quando possível
    if (document.readyState === 'complete') tryPlay();
    else window.addEventListener('load', tryPlay, { once: true });
  </script>
</body>

</html>
